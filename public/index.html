<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Locations - Premium Restaurant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8f9fa; }
        
        .header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            padding: 20px 0;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        .header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 28px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .nav { display: flex; gap: 24px; }
        .nav a { color: white; text-decoration: none; font-weight: 500; }
        
        .hero {
            background: linear-gradient(135deg, #e85d04, #dc2f02);
            color: white;
            text-align: center;
            padding: 60px 0;
        }
        
        .hero h2 { font-size: 42px; margin-bottom: 16px; }
        
        .branches {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            padding: 40px 0;
        }
        
        .branch-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .branch-info {
            padding: 24px;
        }
        
        .branch-info h3 {
            font-size: 24px;
            margin-bottom: 16px;
        }
        
        .info-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            color: #636e72;
            font-size: 14px;
        }
        
        .btn-call {
            display: block;
            width: 100%;
            padding: 12px;
            background: #e85d04;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
        }
        
        .btn-directions {
            display: block;
            width: 100%;
            padding: 12px;
            background: #f0f0f0;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }
        
        .footer {
            background: #1a1a2e;
            color: white;
            padding: 40px 0;
            text-align: center;
            margin-top: 60px;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <span>🍽️</span>
                <span>Premium Restaurant</span>
            </div>
            <nav class="nav">
                <a href="index.html">Menu</a>
                <a href="contact.html">Locations</a>
            </nav>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <h2>Our Locations</h2>
            <p>Visit us at any of our 4 locations</p>
        </div>
    </section>

    <main class="container">
        <div class="branches" id="branchesGrid">
            <div style="text-align:center;padding:40px;">Loading locations...</div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>Powered by <strong>AddisPower</strong></p>
        </div>
    </footer>

    <script>
        // ⚠️ REPLACE WITH YOUR WORKER URL
        const WORKER_URL = 'https://YOUR-WORKER-NAME.YOUR-USERNAME.workers.dev';

        async function loadBranches() {
            try {
                const response = await fetch(`${WORKER_URL}/api/branches`);
                const data = await response.json();
                
                if (data.success) {
                    renderBranches(data.data.branches);
                }
            } catch (error) {
                document.getElementById('branchesGrid').innerHTML = 
                    '<p style="text-align:center;padding:40px;">Unable to load locations.</p>';
            }
        }

        function renderBranches(branches) {
            document.getElementById('branchesGrid').innerHTML = branches.map(b => `
                <div class="branch-card">
                    <div class="branch-info">
                        <h3>${b.name}</h3>
                        <div class="info-row">📍 ${b.address}</div>
                        <div class="info-row">📞 ${b.phone}</div>
                        <div class="info-row">🕐 ${b.hours}</div>
                        <div class="info-row">🅿️ ${b.parking}</div>
                        <button class="btn-call" onclick="location.href='tel:${b.phone.replace(/[^0-9]/g,'')}'">
                            📞 Call Now
                        </button>
                        <button class="btn-directions" onclick="window.open('https://maps.google.com/?q=${b.coordinates.lat},${b.coordinates.lng}')">
                            🗺️ Get Directions
                        </button>
                    </div>
                </div>
            `).join('');
        }

        loadBranches();
    </script>
</body>
</html>
