<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BGS Locations</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#1a1a2e;color:#fff}
        .header{background:#e85d04;padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:999}
        .header a{color:#fff;text-decoration:none;font-size:14px}
        .hero{text-align:center;padding:30px 16px;background:linear-gradient(135deg,#e85d04,#dc2f02)}
        .hero h2{font-size:24px;margin-bottom:4px}
        .branches{padding:20px 16px;display:grid;gap:12px}
        .branch-card{background:#16213e;border-radius:10px;padding:16px}
        .branch-card h3{color:#e85d04;margin-bottom:8px}
        .branch-card p{font-size:13px;color:#b2bec3;margin-bottom:4px}
        .call-btn{display:inline-block;margin-top:8px;padding:8px 16px;background:#e85d04;color:#fff;text-decoration:none;border-radius:16px;font-size:12px;margin-right:6px}
        .footer{text-align:center;padding:20px;font-size:11px;color:#b2bec3}
    </style>
</head>
<body>
    <header class="header"><a href="index.html">← Menu</a><span>📍 BGS Locations</span></header>
    <section class="hero"><h2>7 Branches</h2><p>Loyal to Quality</p></section>
    <div class="branches" id="branchesGrid"></div>
    <div class="footer">📞 0924131415 | 0984131415 | 0985131415</div>
    <script>
        const branches=[
            {n:'ሰማት ፍፀል',a:'ሰማት ፍፀል ቤት አጽራ ፊት ለፊት ሰንግድን መግቢያ',ph:'0924131415'},
            {n:'አያት',a:'አያት ለሚከሩ ከ/ከተማ አጠንብ',ph:'0984131415'},
            {n:'ለቡ መብቃ',a:'ለቡ መብቃ ሰፈር',ph:'0985131415'},
            {n:'ቤተል',a:'ቤተል ቢጫ ፎቶ ሪፖ ህንፃ አጠንብ',ph:'0948131415'},
            {n:'ና ኪሎ',a:'ና ኪሎ ት/ማርያም ቤ/ክ ፊት ለፊት',ph:'0986131415'},
            {n:'ፍላጧን',a:'ፍላጧንን ከሆች ፊጆንሲ ፊት ለፊት',ph:'0968131415'},
            {n:'በሌ መድንጋግለም',a:'በሌ መድንጋግለም ከቴሌ አጠንብ',ph:'0961131415'}
        ];
        document.getElementById('branchesGrid').innerHTML=branches.map(b=>`
            <div class="branch-card"><h3>${b.n}</h3><p>📍 ${b.a}</p><p>📞 ${b.ph}</p><a href="tel:${b.ph}" class="call-btn">📞 Call</a></div>
        `).join('');
    </script>
</body>
</html>
